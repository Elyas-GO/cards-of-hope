<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>54 Cards of Hope</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
body { font-family: serif; background:#090909; }

/* TYPEWRITER */
.typewriter {
  font-family: 'Special Elite', monospace;
  letter-spacing: 0.5px;
}

/* CARD */
.card {
  perspective: 1200px;
  aspect-ratio: 5/7;
  cursor: pointer;
}

.card-inner {
  width: 100%;
  height: 100%;
  transition: transform 0.8s;
  transform-style: preserve-3d;
  position: relative;
}

/* FLIP */
.card:hover .card-inner { transform: rotateY(180deg); }
.card.flipped .card-inner { transform: rotateY(180deg); }

/* FACES */
.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 24px;
  backface-visibility: hidden;
  overflow: hidden;
}

/* FRONT */
.card-front {
  background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
  padding: 18px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
}

/* PAPER TEXTURE (EMBEDDED SVG NO EXTERNAL LINK) */
.card-front::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml;utf8,\
  <svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'>\
  <filter id='noise'>\
  <feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/>\
  </filter>\
  <rect width='100%' height='100%' filter='url(%23noise)' opacity='0.15'/>\
  </svg>");
  pointer-events: none;
}

/* WORN EDGES */
.card-front::after {
  content:"";
  position:absolute;
  inset:0;
  box-shadow:
    inset 0 0 35px rgba(0,0,0,0.85),
    inset 0 0 8px rgba(255,255,255,0.05);
  pointer-events:none;
}

/* BACK */
.card-back {
  transform: rotateY(180deg);
  background-image: url('card cover.png');
  background-size: cover;
  background-position: center;
}

/* GOLD FOIL */
.gold {
  background: linear-gradient(120deg,#facc15,#fff3a0,#facc15);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 8px rgba(250,204,21,0.6);
}

/* GLOW */
.card.red:hover { box-shadow:0 0 40px rgba(255,80,80,0.9); }
.card.black:hover { box-shadow:0 0 40px rgba(255,255,255,0.5); }

</style>
</head>

<body class="text-amber-100">

<!-- HERO -->
<header class="min-h-screen flex items-center justify-center text-center">
  <div>
    <h1 class="text-6xl mb-6">CARDS OF HOPE</h1>
    <p class="text-xl mb-10">From the card table to the cross</p>
    <a href="#prophecies" class="bg-amber-400 text-black px-10 py-4 rounded-xl text-xl">
      SEE THE 52 PROPHECIES
    </a>
  </div>
</header>

<!-- PROPHECIES -->
<section id="prophecies" class="py-20 px-6">
  <h2 class="text-4xl mb-10 text-center">THE 52 PROPHECIES</h2>
  <div id="prophecy-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
</section>

<!-- JOKERS -->
<section class="py-20 bg-[#1a1208] px-6">
  <h2 class="text-4xl text-center mb-12">THE TWO JOKERS</h2>

  <div class="grid md:grid-cols-2 gap-10">

    <div class="card red">
      <div class="card-inner">

        <div class="card-face card-front typewriter">
          <div class="text-3xl">🃏</div>
          <div class="text-center">
            SCREWTAPE FILE<br>
            <span class="text-xs opacity-70">Hidden in plain sight</span>
          </div>
          <div class="text-xs text-right gold">CLASSIFIED</div>
        </div>

        <div class="card-face card-back"></div>

      </div>
    </div>

    <div class="card black">
      <div class="card-inner">

        <div class="card-face card-front typewriter">
          <div class="text-3xl">🃏</div>
          <div class="text-center">
            MI7 DOSSIER<br>
            <span class="text-xs opacity-70">Nightshade Alpha</span>
          </div>
          <div class="text-xs text-right gold">TOP SECRET</div>
        </div>

        <div class="card-face card-back"></div>

      </div>
    </div>

  </div>
</section>

<!-- GALLERY -->
<section class="py-20 px-6">
  <h2 class="text-4xl text-center mb-10">SEE THE ART</h2>
  <div id="deck-gallery" class="grid grid-cols-3 md:grid-cols-6 lg:grid-cols-8 gap-4"></div>
</section>

<!-- FOOTER -->
<footer class="py-20 text-center border-t border-amber-400">
  <a href="buy.html" class="bg-amber-400 text-black px-12 py-6 text-2xl rounded-xl">
    BUY THE DECK
  </a>
</footer>

<script>
const prophecies = [
  {value:"A", suit:"♥", color:"red", text:"Rise from the dead"},
  {value:"K", suit:"♠", color:"black", text:"Buried with the rich"},
  {value:"Q", suit:"♦", color:"red", text:"Third day resurrection"},
  {value:"J", suit:"♣", color:"black", text:"Pierced side"},
  {value:"10", suit:"♥", color:"red", text:"Given vinegar"},
  {value:"9", suit:"♠", color:"black", text:"Hands pierced"},
  {value:"8", suit:"♦", color:"red", text:"Betrayed"},
  {value:"7", suit:"♣", color:"black", text:"Rejected"},
  {value:"6", suit:"♥", color:"red", text:"Eternal King"},
  {value:"5", suit:"♠", color:"black", text:"Priest forever"},
  {value:"4", suit:"♦", color:"red", text:"Nazarene"},
  {value:"3", suit:"♣", color:"black", text:"Virgin birth"}
];

function createCard(p, simple=false){
  const card = document.createElement("div");
  card.className = `card ${p.color}`;

  card.innerHTML = `
    <div class="card-inner">

      <div class="card-face card-front typewriter">
        ${
          simple
          ? `<div class="flex items-center justify-center text-2xl gold">${p.value}${p.suit}</div>`
          : `
          <div class="flex justify-between">
            <span class="text-2xl gold">${p.value}</span>
            <span class="${p.color==='red'?'text-red-500':'text-white'}">${p.suit}</span>
          </div>

          <div class="text-center text-sm leading-relaxed">${p.text}</div>

          <div class="text-xs text-right gold">FILE // PROPHECY</div>
          `
        }
      </div>

      <div class="card-face card-back"></div>

    </div>
  `;

  /* TAP FLIP */
  card.addEventListener("click", () => {
    card.classList.toggle("flipped");
  });

  return card;
}

/* LOAD */
const grid = document.getElementById("prophecy-grid");
const gallery = document.getElementById("deck-gallery");

prophecies.forEach(p => {
  grid.appendChild(createCard(p,false));
  gallery.appendChild(createCard(p,true));
});
</script>

</body>
</html>
